# application-dev.yml
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/delifaybook?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug

# CORS - dev (prod는 배포 환경변수로 오버라이드)
app:
  cors:
    allowed-origins: "http://localhost:3000"

# NLK - 절대 커밋 금지: 환경변수 only
nlk:
  cert-key: ${NLK_CERT_KEY}
